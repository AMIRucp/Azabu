<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="50%" stop-color="#E0F2FE"/>
      <stop offset="100%" stop-color="#93C5FD"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#050910"/>
    <!-- Zen garden circles (karesansui) -->
    <g stroke="#334155" stroke-width="0.8" fill="none" opacity="0.35">
      <circle cx="128" cy="128" r="100"/>
      <circle cx="128" cy="128" r="82"/>
      <circle cx="128" cy="128" r="64"/>
      <circle cx="128" cy="128" r="46"/>
    </g>
    <!-- Prismatic light rays -->
    <g opacity="0.15">
      <line x1="128" y1="128" x2="60" y2="40" stroke="#A855F7" stroke-width="2"/>
      <line x1="128" y1="128" x2="196" y2="40" stroke="#22C55E" stroke-width="2"/>
      <line x1="128" y1="128" x2="30" y2="155" stroke="#3B82F6" stroke-width="2"/>
      <line x1="128" y1="128" x2="226" y2="155" stroke="#A855F7" stroke-width="2"/>
      <line x1="128" y1="128" x2="128" y2="220" stroke="#22C55E" stroke-width="2"/>
    </g>
    <!-- Left hand (prayer mudra position) -->
    <g transform="translate(80, 128)">
      <!-- Palm -->
      <ellipse cx="0" cy="10" rx="28" ry="38" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1.5"/>
      <!-- Fingers -->
      <rect x="-24" y="-40" width="12" height="55" rx="6" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <rect x="-10" y="-52" width="12" height="67" rx="6" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <rect x="4" y="-52" width="12" height="67" rx="6" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <rect x="18" y="-44" width="10" height="59" rx="5" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <!-- Thumb -->
      <ellipse cx="-30" cy="-10" rx="10" ry="20" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1" transform="rotate(25, -30, -10)"/>
      <!-- Kanji 金剛 on wrist -->
      <text x="0" y="50" font-family="serif" font-size="14" text-anchor="middle" fill="#3B82F6" opacity="0.7" font-weight="bold">金剛</text>
    </g>
    <!-- Right hand mirror -->
    <g transform="translate(176, 128) scale(-1, 1)">
      <ellipse cx="0" cy="10" rx="28" ry="38" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1.5"/>
      <rect x="-24" y="-40" width="12" height="55" rx="6" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <rect x="-10" y="-52" width="12" height="67" rx="6" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <rect x="4" y="-52" width="12" height="67" rx="6" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <rect x="18" y="-44" width="10" height="59" rx="5" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1"/>
      <ellipse cx="-30" cy="-10" rx="10" ry="20" fill="url(#crystal)" stroke="#93C5FD" stroke-width="1" transform="rotate(25, -30, -10)"/>
    </g>
    <!-- Prismatic reflections shifting -->
    <g opacity="0.25">
      <polygon points="128,105 108,135 128,145 148,135" fill="#A855F7">
        <animate attributeName="fill" values="#A855F7;#22C55E;#3B82F6;#A855F7" dur="8s" repeatCount="indefinite"/>
      </polygon>
    </g>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#3B82F6" stroke-width="2"/>
</svg>
