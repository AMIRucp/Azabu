<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>
    <linearGradient id="blade-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="50%" stop-color="#C0C8D8"/>
      <stop offset="100%" stop-color="#8090A0"/>
    </linearGradient>
    <linearGradient id="trail-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22C55E" stop-opacity="0"/>
      <stop offset="100%" stop-color="#22C55E" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#121820"/>
    <!-- Rising sun arc -->
    <path d="M68 170 A80 80 0 0 1 188 170" fill="#22C55E" opacity="0.12"/>
    <path d="M78 170 A70 70 0 0 1 178 170" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.3"/>
    <!-- Sun rays -->
    <g opacity="0.2" stroke="#22C55E" stroke-width="1">
      <line x1="128" y1="90" x2="128" y2="50"/>
      <line x1="155" y1="98" x2="175" y2="68"/>
      <line x1="101" y1="98" x2="81" y2="68"/>
      <line x1="168" y1="130" x2="205" y2="130"/>
      <line x1="88" y1="130" x2="51" y2="130"/>
    </g>
    <!-- Kanji 挑 seal -->
    <g transform="translate(185, 185)">
      <rect x="-18" y="-18" width="36" height="36" rx="4" fill="#22C55E" opacity="0.15" stroke="#22C55E" stroke-width="1" stroke-opacity="0.4"/>
      <text x="0" y="12" font-family="serif" font-size="28" text-anchor="middle" fill="#22C55E" opacity="0.8" font-weight="bold">挑</text>
    </g>
    <!-- Katana blade (angled up-right) -->
    <g transform="rotate(-55, 128, 128)" filter="url(#glow)">
      <!-- Blade body -->
      <polygon points="130,30 126,30 118,200 138,200" fill="url(#blade-grad)"/>
      <!-- Edge highlight -->
      <line x1="128" y1="30" x2="118" y2="200" stroke="white" stroke-width="1" opacity="0.8"/>
      <!-- Tip -->
      <polygon points="130,30 126,30 128,18" fill="#FFFFFF"/>
      <!-- Tsuba -->
      <ellipse cx="128" cy="200" rx="18" ry="6" fill="#555" stroke="#777" stroke-width="1"/>
      <!-- Handle -->
      <rect x="121" y="200" width="14" height="30" rx="3" fill="#3A3A3A"/>
      <!-- Handle wrap lines -->
      <line x1="121" y1="208" x2="135" y2="208" stroke="#555" stroke-width="1.5"/>
      <line x1="121" y1="216" x2="135" y2="216" stroke="#555" stroke-width="1.5"/>
      <line x1="121" y1="224" x2="135" y2="224" stroke="#555" stroke-width="1.5"/>
    </g>
    <!-- Green energy trail -->
    <g transform="rotate(-55, 128, 128)" filter="url(#glow)">
      <polygon points="118,30 114,30 106,200 120,200" fill="url(#trail-grad)" opacity="0.7"/>
    </g>
    <!-- Pulsing green dot -->
    <circle cx="128" cy="62" r="4" fill="#22C55E" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.3;0.9" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.8"/>
</svg>
