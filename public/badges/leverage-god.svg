<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <radialGradient id="divine-light" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#E8751A" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#111419" stop-opacity="0"/>
    </radialGradient>
    <filter id="lglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#0A0D14"/>
    <!-- Storm clouds background -->
    <ellipse cx="60" cy="100" rx="55" ry="35" fill="#1E2535" opacity="0.8"/>
    <ellipse cx="195" cy="90" rx="55" ry="35" fill="#1E2535" opacity="0.8"/>
    <ellipse cx="128" cy="80" rx="60" ry="30" fill="#252C3A" opacity="0.7"/>
    <!-- Divine light -->
    <circle cx="128" cy="105" r="70" fill="url(#divine-light)" opacity="0.6"/>
    <!-- Torii gate -->
    <!-- Main crossbeam (kasagi) -->
    <rect x="38" y="85" width="180" height="12" rx="3" fill="#DC2626"/>
    <!-- Second crossbeam (nuki) -->
    <rect x="55" y="108" width="146" height="9" rx="2" fill="#DC2626"/>
    <!-- Left pillar -->
    <rect x="60" y="85" width="18" height="135" rx="2" fill="#DC2626"/>
    <!-- Right pillar -->
    <rect x="178" y="85" width="18" height="135" rx="2" fill="#DC2626"/>
    <!-- Pillar bases -->
    <rect x="55" y="210" width="28" height="10" rx="2" fill="#CC1111"/>
    <rect x="173" y="210" width="28" height="10" rx="2" fill="#CC1111"/>
    <!-- Kasagi ends curved up -->
    <rect x="30" y="78" width="20" height="8" rx="4" fill="#DC2626" transform="rotate(-8, 40, 82)"/>
    <rect x="206" y="78" width="20" height="8" rx="4" fill="#DC2626" transform="rotate(8, 216, 82)"/>
    <!-- Lightning bolts -->
    <g filter="url(#lglow)">
      <polygon points="90,50 82,95 94,92 86,130 102,85 88,88" fill="#FBBF24" opacity="0.95">
        <animate attributeName="opacity" values="0.95;0.1;0.95;0.1;0.95" dur="2.5s" repeatCount="indefinite"/>
      </polygon>
      <polygon points="166,44 158,90 170,87 162,125 178,80 164,83" fill="#FBBF24" opacity="0.9">
        <animate attributeName="opacity" values="0.9;0.1;0.9;0.1;0.9" dur="2.5s" repeatCount="indefinite" begin="0.7s"/>
      </polygon>
      <polygon points="128,35 122,75 131,73 125,105 138,68 129,70" fill="#F0F2F5" opacity="0.85">
        <animate attributeName="opacity" values="0.85;0.05;0.85;0.2;0.85" dur="3s" repeatCount="indefinite" begin="1.2s"/>
      </polygon>
    </g>
    <!-- Kanji 神 suspended in gate -->
    <text x="128" y="175" font-family="serif" font-size="52" text-anchor="middle" fill="#FFD700" font-weight="bold" opacity="0.9">神</text>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#F59E0B" stroke-width="2.5">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</svg>
