<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <linearGradient id="light-shaft" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFD700" stop-opacity="0"/>
    </linearGradient>
    <filter id="uglow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#060C0A"/>
    <!-- Golden light from canopy -->
    <path d="M80 0 Q128 60 90 100" fill="url(#light-shaft)"/>
    <path d="M128 0 Q160 50 135 95" fill="url(#light-shaft)" opacity="0.7"/>
    <path d="M168 0 Q155 55 172 100" fill="url(#light-shaft)" opacity="0.5"/>
    <!-- Bamboo stalks (live, green) -->
    <g stroke="#22C55E" stroke-width="6" stroke-linecap="round">
      <line x1="45" y1="0" x2="48" y2="256"/>
      <line x1="82" y1="0" x2="78" y2="256"/>
      <line x1="175" y1="0" x2="178" y2="256"/>
      <line x1="215" y1="0" x2="210" y2="256"/>
    </g>
    <!-- Bamboo nodes -->
    <g fill="none" stroke="#3CAA4A" stroke-width="3">
      <line x1="40" y1="60" x2="53" y2="60"/>
      <line x1="40" y1="120" x2="53" y2="120"/>
      <line x1="40" y1="180" x2="53" y2="180"/>
      <line x1="74" y1="80" x2="85" y2="80"/>
      <line x1="74" y1="140" x2="85" y2="140"/>
      <line x1="74" y1="200" x2="85" y2="200"/>
      <line x1="170" y1="50" x2="182" y2="50"/>
      <line x1="170" y1="110" x2="182" y2="110"/>
      <line x1="170" y1="170" x2="182" y2="170"/>
      <line x1="205" y1="70" x2="218" y2="70"/>
      <line x1="205" y1="130" x2="218" y2="130"/>
      <line x1="205" y1="190" x2="218" y2="190"/>
    </g>
    <!-- Bamboo leaves -->
    <g fill="#22C55E" opacity="0.6">
      <ellipse cx="58" cy="55" rx="18" ry="5" transform="rotate(-30, 58, 55)"/>
      <ellipse cx="38" cy="115" rx="16" ry="4" transform="rotate(25, 38, 115)"/>
      <ellipse cx="168" cy="105" rx="18" ry="5" transform="rotate(-20, 168, 105)"/>
      <ellipse cx="215" cy="75" rx="15" ry="4" transform="rotate(15, 215, 75)"/>
    </g>
    <!-- Falling cut bamboo stalks -->
    <g fill="#6B7280" opacity="0.7">
      <rect x="90" y="50" width="8" height="80" rx="3" transform="rotate(20, 94, 90)">
        <animateTransform attributeName="transform" type="rotate" values="20 94 90;35 94 200;35 94 200" dur="6s" repeatCount="indefinite"/>
      </rect>
      <rect x="120" y="60" width="7" height="70" rx="3" transform="rotate(-15, 123, 95)">
        <animateTransform attributeName="transform" type="rotate" values="-15 123 95;-30 123 210;-30 123 210" dur="6s" repeatCount="indefinite" begin="0.5s"/>
      </rect>
      <rect x="148" y="45" width="8" height="85" rx="3" transform="rotate(8, 152, 87)">
        <animateTransform attributeName="transform" type="rotate" values="8 152 87;25 152 220;25 152 220" dur="6s" repeatCount="indefinite" begin="1s"/>
      </rect>
    </g>
    <!-- Lone samurai silhouette -->
    <g filter="url(#uglow)">
      <!-- Shadow/silhouette -->
      <g fill="#F0F2F5">
        <!-- Legs -->
        <rect x="120" y="185" width="14" height="35" rx="5"/>
        <rect x="134" y="185" width="14" height="35" rx="5"/>
        <!-- Body/armor torso -->
        <rect x="110" y="148" width="36" height="42" rx="6"/>
        <!-- Arms -->
        <rect x="94" y="152" width="18" height="10" rx="5" transform="rotate(-10, 103, 157)"/>
        <!-- Right arm raised to shoulder (katana on shoulder) -->
        <rect x="146" y="140" width="24" height="10" rx="5" transform="rotate(-20, 158, 145)"/>
        <!-- Head -->
        <circle cx="128" cy="136" r="16"/>
        <!-- Helmet/kabuto -->
        <path d="M112 130 Q116 115 128 112 Q140 115 144 130" fill="#F0F2F5"/>
        <!-- Katana on shoulder -->
        <rect x="152" y="128" width="60" height="4" rx="2" transform="rotate(-10, 182, 130)" fill="#FFFFFF"/>
      </g>
      <!-- Gold edge glow -->
      <circle cx="128" cy="165" r="38" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.4">
        <animate attributeName="r" values="38;42;38" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite"/>
      </circle>
    </g>
    <!-- Kanji 無敵 hovering above -->
    <text x="128" y="48" font-family="serif" font-size="22" text-anchor="middle" fill="#FFD700" opacity="0.9" font-weight="bold" filter="url(#uglow)">無敵</text>
    <!-- Light rays shifting -->
    <g opacity="0.1">
      <path d="M128 0 L90 256 L168 256Z" fill="#FFD700">
        <animate attributeName="opacity" values="0.1;0.2;0.1" dur="6s" repeatCount="indefinite"/>
      </path>
    </g>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#F59E0B" stroke-width="2.5">
    <animate attributeName="stroke-dasharray" values="0,800;400,400;800,0;400,400;0,800" dur="3s" repeatCount="indefinite"/>
  </circle>
</svg>
