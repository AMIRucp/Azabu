<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <linearGradient id="fan5" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8751A"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#0D1017"/>
    <!-- Five tessen (war fans) in ascending arc formation -->
    <!-- Fan 1 - leftmost, small flame -->
    <g transform="translate(42, 145) rotate(-35)">
      <rect x="-12" y="-50" width="24" height="55" rx="3" fill="#334155" stroke="#4A5568" stroke-width="1"/>
      <rect x="-12" y="-50" width="5" height="55" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="-2" y="-50" width="5" height="55" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="8" y="-50" width="5" height="55" rx="2" fill="#2A3545" opacity="0.7"/>
      <text x="0" y="15" font-family="serif" font-size="11" text-anchor="middle" fill="#F0F2F5" font-weight="bold">一</text>
      <!-- Small flame -->
      <path d="M-4,-56 Q0,-64 4,-56 Q2,-50 0,-46 Q-2,-50 -4,-56Z" fill="#E8751A" opacity="0.8"/>
    </g>
    <!-- Fan 2 -->
    <g transform="translate(82, 118) rotate(-18)">
      <rect x="-12" y="-55" width="24" height="60" rx="3" fill="#334155" stroke="#4A5568" stroke-width="1"/>
      <rect x="-12" y="-55" width="5" height="60" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="-2" y="-55" width="5" height="60" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="8" y="-55" width="5" height="60" rx="2" fill="#2A3545" opacity="0.7"/>
      <text x="0" y="18" font-family="serif" font-size="11" text-anchor="middle" fill="#F0F2F5" font-weight="bold">二</text>
      <!-- Slightly bigger flame -->
      <path d="M-6,-62 Q0,-74 6,-62 Q3,-54 0,-48 Q-3,-54 -6,-62Z" fill="#E8751A" opacity="0.85"/>
    </g>
    <!-- Fan 3 - center -->
    <g transform="translate(128, 108) rotate(0)">
      <rect x="-13" y="-60" width="26" height="65" rx="3" fill="#334155" stroke="#4A5568" stroke-width="1"/>
      <rect x="-13" y="-60" width="6" height="65" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="-2" y="-60" width="6" height="65" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="9" y="-60" width="6" height="65" rx="2" fill="#2A3545" opacity="0.7"/>
      <text x="0" y="20" font-family="serif" font-size="11" text-anchor="middle" fill="#F0F2F5" font-weight="bold">三</text>
      <!-- Medium flame -->
      <path d="M-7,-68 Q0,-82 7,-68 Q4,-58 0,-52 Q-4,-58 -7,-68Z" fill="#E8751A"/>
      <path d="M-3,-68 Q0,-78 3,-68 Q1,-62 0,-56 Q-1,-62 -3,-68Z" fill="#FFD700" opacity="0.7"/>
    </g>
    <!-- Fan 4 -->
    <g transform="translate(174, 118) rotate(18)">
      <rect x="-13" y="-58" width="26" height="62" rx="3" fill="#334155" stroke="#4A5568" stroke-width="1"/>
      <rect x="-13" y="-58" width="6" height="62" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="-2" y="-58" width="6" height="62" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="9" y="-58" width="6" height="62" rx="2" fill="#2A3545" opacity="0.7"/>
      <text x="0" y="19" font-family="serif" font-size="11" text-anchor="middle" fill="#F0F2F5" font-weight="bold">四</text>
      <!-- Bigger flame -->
      <path d="M-8,-66 Q0,-82 8,-66 Q5,-54 0,-46 Q-5,-54 -8,-66Z" fill="#EF4444"/>
      <path d="M-4,-66 Q0,-78 4,-66 Q2,-58 0,-50 Q-2,-58 -4,-66Z" fill="#FFD700" opacity="0.6"/>
    </g>
    <!-- Fan 5 - rightmost, biggest flame (animated) -->
    <g transform="translate(214, 145) rotate(35)">
      <rect x="-12" y="-52" width="24" height="57" rx="3" fill="#334155" stroke="#4A5568" stroke-width="1"/>
      <rect x="-12" y="-52" width="5" height="57" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="-2" y="-52" width="5" height="57" rx="2" fill="#2A3545" opacity="0.7"/>
      <rect x="8" y="-52" width="5" height="57" rx="2" fill="#2A3545" opacity="0.7"/>
      <text x="0" y="16" font-family="serif" font-size="11" text-anchor="middle" fill="#F0F2F5" font-weight="bold">五</text>
      <!-- Big animated flame -->
      <path d="M-10,-60 Q0,-80 10,-60 Q6,-46 0,-38 Q-6,-46 -10,-60Z" fill="#EF4444">
        <animate attributeName="d" values="M-10,-60 Q0,-80 10,-60 Q6,-46 0,-38 Q-6,-46 -10,-60Z;M-10,-58 Q0,-80 10,-58 Q6,-44 0,-36 Q-6,-44 -10,-58Z;M-10,-60 Q0,-80 10,-60 Q6,-46 0,-38 Q-6,-46 -10,-60Z" dur="1.5s" repeatCount="indefinite"/>
      </path>
      <path d="M-5,-60 Q0,-76 5,-60 Q2,-50 0,-42 Q-2,-50 -5,-60Z" fill="#FFD700">
        <animate attributeName="d" values="M-5,-60 Q0,-76 5,-60 Q2,-50 0,-42 Q-2,-50 -5,-60Z;M-5,-58 Q0,-76 5,-58 Q2,-48 0,-40 Q-2,-48 -5,-58Z;M-5,-60 Q0,-76 5,-60 Q2,-50 0,-42 Q-2,-50 -5,-60Z" dur="1.2s" repeatCount="indefinite" begin="0.2s"/>
      </path>
    </g>
    <!-- Ground/base line -->
    <line x1="30" y1="200" x2="226" y2="200" stroke="#334155" stroke-width="2" opacity="0.4"/>
    <!-- Title -->
    <text x="128" y="225" font-family="serif" font-size="14" text-anchor="middle" fill="#E8751A" opacity="0.7" font-weight="bold">連勝</text>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
</svg>
