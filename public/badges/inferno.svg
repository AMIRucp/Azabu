<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <radialGradient id="fire-base" cx="50%" cy="80%" r="60%">
      <stop offset="0%" stop-color="#E8751A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0A0505" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="dragon-fire" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#E8751A"/>
      <stop offset="40%" stop-color="#EF4444"/>
      <stop offset="80%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F0F2F5"/>
    </linearGradient>
    <filter id="ffglow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0A0505"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#0A0505"/>
    <!-- Heat haze base glow -->
    <circle cx="128" cy="210" r="80" fill="url(#fire-base)"/>
    <!-- Bonfire log base -->
    <ellipse cx="128" cy="215" rx="55" ry="12" fill="#3A2010"/>
    <rect x="76" y="205" width="104" height="12" rx="4" fill="#5A3015" transform="rotate(-8, 128, 211)"/>
    <rect x="76" y="205" width="104" height="12" rx="4" fill="#4A2510" transform="rotate(8, 128, 211)"/>
    <!-- Main fire base -->
    <g filter="url(#ffglow)">
      <path d="M72 215 Q62 175 78 145 Q88 120 75 95 Q95 120 88 148 Q96 170 85 195 Q90 210 80 215Z" fill="#E8751A" opacity="0.9">
        <animate attributeName="d" values="M72 215 Q62 175 78 145 Q88 120 75 95 Q95 120 88 148 Q96 170 85 195 Q90 210 80 215Z;M70 215 Q60 175 76 143 Q86 118 73 93 Q93 118 86 146 Q94 168 83 193 Q88 209 78 215Z;M72 215 Q62 175 78 145 Q88 120 75 95 Q95 120 88 148 Q96 170 85 195 Q90 210 80 215Z" dur="2s" repeatCount="indefinite"/>
      </path>
      <path d="M184 215 Q194 175 178 145 Q168 120 181 95 Q161 120 168 148 Q160 170 171 195 Q166 210 176 215Z" fill="#E8751A" opacity="0.9">
        <animate attributeName="d" values="M184 215 Q194 175 178 145 Q168 120 181 95 Q161 120 168 148 Q160 170 171 195 Q166 210 176 215Z;M186 215 Q196 175 180 143 Q170 118 183 93 Q163 118 170 146 Q162 168 173 193 Q168 209 178 215Z;M184 215 Q194 175 178 145 Q168 120 181 95 Q161 120 168 148 Q160 170 171 195 Q166 210 176 215Z" dur="2s" repeatCount="indefinite" begin="0.4s"/>
      </path>
      <!-- Center rising fire -->
      <path d="M108 215 Q95 180 105 150 Q112 128 100 105 Q118 128 112 155 Q118 178 110 205 Q112 212 108 215Z" fill="#EF4444" opacity="0.95">
        <animate attributeName="d" values="M108 215 Q95 180 105 150 Q112 128 100 105 Q118 128 112 155 Q118 178 110 205 Q112 212 108 215Z;M109 215 Q96 180 106 148 Q113 126 101 103 Q119 126 113 153 Q119 176 111 203 Q113 211 109 215Z;M108 215 Q95 180 105 150 Q112 128 100 105 Q118 128 112 155 Q118 178 110 205 Q112 212 108 215Z" dur="1.8s" repeatCount="indefinite" begin="0.2s"/>
      </path>
      <path d="M148 215 Q161 180 151 150 Q144 128 156 105 Q138 128 144 155 Q138 178 146 205 Q144 212 148 215Z" fill="#EF4444" opacity="0.95">
        <animate attributeName="d" values="M148 215 Q161 180 151 150 Q144 128 156 105 Q138 128 144 155 Q138 178 146 205 Q144 212 148 215Z;M147 215 Q160 180 150 148 Q143 126 155 103 Q137 126 143 153 Q137 176 145 203 Q143 211 147 215Z;M148 215 Q161 180 151 150 Q144 128 156 105 Q138 128 144 155 Q138 178 146 205 Q144 212 148 215Z" dur="1.8s" repeatCount="indefinite" begin="0.6s"/>
      </path>
    </g>
    <!-- Dragon silhouette in flames -->
    <g fill="url(#dragon-fire)" opacity="0.7" filter="url(#ffglow)">
      <!-- Dragon body curve -->
      <path d="M128 210 Q110 175 98 148 Q88 122 96 100 Q104 80 118 70 Q128 64 138 70 Q152 80 160 100 Q168 122 158 148 Q146 175 128 210Z"/>
      <!-- Dragon wings -->
      <path d="M118 130 Q95 110 75 118 Q85 128 95 132 Q105 136 115 138 Z"/>
      <path d="M138 130 Q161 110 181 118 Q171 128 161 132 Q151 136 141 138 Z"/>
      <!-- Dragon head -->
      <ellipse cx="128" cy="75" rx="15" ry="12" fill="#FBBF24" opacity="0.9"/>
      <!-- Horns -->
      <polygon points="122,63 116,48 126,60" fill="#FFD700"/>
      <polygon points="134,63 140,48 130,60" fill="#FFD700"/>
    </g>
    <!-- Embers floating -->
    <g fill="#F59E0B">
      <circle cx="88" cy="165" r="2" opacity="0.8">
        <animate attributeName="cy" values="165;120;165" dur="3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="165" cy="155" r="2" opacity="0.7">
        <animate attributeName="cy" values="155;108;155" dur="3.5s" repeatCount="indefinite" begin="0.8s"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="3.5s" repeatCount="indefinite" begin="0.8s"/>
      </circle>
      <circle cx="108" cy="175" r="1.5" opacity="0.9">
        <animate attributeName="cy" values="175;130;175" dur="2.8s" repeatCount="indefinite" begin="1.4s"/>
        <animate attributeName="opacity" values="0.9;0;0.9" dur="2.8s" repeatCount="indefinite" begin="1.4s"/>
      </circle>
      <circle cx="148" cy="170" r="1.5" opacity="0.8">
        <animate attributeName="cy" values="170;125;170" dur="4s" repeatCount="indefinite" begin="0.5s"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
    </g>
    <!-- Kanji 炎 in embers -->
    <text x="128" y="42" font-family="serif" font-size="28" text-anchor="middle" fill="#FFD700" opacity="0.7" font-weight="bold">炎</text>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#F59E0B" stroke-width="2.5">
    <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
