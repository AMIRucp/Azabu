<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <radialGradient id="moon-g" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#F0F2F5"/>
      <stop offset="100%" stop-color="#C8D0DC"/>
    </radialGradient>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#060912"/>
    <!-- Stars -->
    <g fill="#F0F2F5">
      <circle cx="55" cy="45" r="1.5" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3s" repeatCount="indefinite"/></circle>
      <circle cx="80" cy="30" r="1" opacity="0.6"><animate attributeName="opacity" values="0.6;0.1;0.6" dur="2.5s" repeatCount="indefinite" begin="0.5s"/></circle>
      <circle cx="165" cy="38" r="1.5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.2;0.7" dur="4s" repeatCount="indefinite" begin="1s"/></circle>
      <circle cx="200" cy="55" r="1" opacity="0.5"><animate attributeName="opacity" values="0.5;0.1;0.5" dur="3.5s" repeatCount="indefinite" begin="0.3s"/></circle>
      <circle cx="40" cy="80" r="1.5" opacity="0.7"><animate attributeName="opacity" values="0.7;0.1;0.7" dur="2.8s" repeatCount="indefinite" begin="1.5s"/></circle>
      <circle cx="220" cy="85" r="1" opacity="0.8"><animate attributeName="opacity" values="0.8;0.2;0.8" dur="3.2s" repeatCount="indefinite" begin="0.8s"/></circle>
      <circle cx="192" cy="30" r="1" opacity="0.6"><animate attributeName="opacity" values="0.6;0.2;0.6" dur="4.5s" repeatCount="indefinite" begin="2s"/></circle>
      <circle cx="35" cy="140" r="1.5" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3s" repeatCount="indefinite" begin="1.2s"/></circle>
    </g>
    <!-- Full moon -->
    <circle cx="168" cy="72" r="42" fill="url(#moon-g)" opacity="0.95"/>
    <!-- Moon craters -->
    <circle cx="155" cy="60" r="6" fill="#D8DFE8" opacity="0.5"/>
    <circle cx="175" cy="80" r="4" fill="#D0D8E2" opacity="0.4"/>
    <circle cx="162" cy="88" r="3" fill="#D8DFE8" opacity="0.3"/>
    <!-- Mist/ground mist -->
    <ellipse cx="128" cy="220" rx="130" ry="25" fill="#6B7280" opacity="0.12"/>
    <ellipse cx="128" cy="215" rx="120" ry="20" fill="#8090A0" opacity="0.08"/>
    <!-- Winter bare branch -->
    <path d="M30 230 Q60 200 80 175 Q90 160 110 150 Q120 148 128 155" fill="none" stroke="#334155" stroke-width="5" stroke-linecap="round"/>
    <path d="M128 155 Q140 148 155 152 Q165 155 180 145" fill="none" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
    <path d="M128 155 Q130 140 138 130" fill="none" stroke="#334155" stroke-width="3" stroke-linecap="round"/>
    <!-- Branch detail smaller twigs -->
    <path d="M80 175 Q85 165 95 162" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <path d="M110 150 Q108 138 116 133" fill="none" stroke="#334155" stroke-width="2" stroke-linecap="round"/>
    <!-- Owl body -->
    <ellipse cx="128" cy="165" rx="26" ry="30" fill="#1E293B"/>
    <!-- Owl head -->
    <circle cx="128" cy="138" r="24" fill="#253040"/>
    <!-- Ear tufts -->
    <polygon points="114,116 108,100 120,112" fill="#1E293B"/>
    <polygon points="142,116 148,100 136,112" fill="#1E293B"/>
    <!-- Facial disc -->
    <ellipse cx="128" cy="138" rx="18" ry="16" fill="#3A4A5A" opacity="0.7"/>
    <!-- Eyes (glowing orange Azabu color) -->
    <circle cx="118" cy="134" r="9" fill="#0A0E14"/>
    <circle cx="138" cy="134" r="9" fill="#0A0E14"/>
    <circle cx="118" cy="134" r="6" fill="#E8751A">
      <animate attributeName="r" values="6;8;6" dur="8s" repeatCount="indefinite" begin="3s"/>
    </circle>
    <circle cx="138" cy="134" r="6" fill="#E8751A">
      <animate attributeName="r" values="6;8;6" dur="8s" repeatCount="indefinite" begin="3.1s"/>
    </circle>
    <!-- Eye highlights -->
    <circle cx="115" cy="131" r="2" fill="#FFFFFF" opacity="0.8"/>
    <circle cx="135" cy="131" r="2" fill="#FFFFFF" opacity="0.8"/>
    <!-- Beak -->
    <polygon points="128,142 122,150 134,150" fill="#8B7355"/>
    <!-- Wing feather hints -->
    <path d="M102 165 Q100 175 105 185 Q110 190 115 182" fill="none" stroke="#334155" stroke-width="2" opacity="0.6"/>
    <path d="M154 165 Q156 175 151 185 Q146 190 141 182" fill="none" stroke="#334155" stroke-width="2" opacity="0.6"/>
    <!-- Owl talons on branch -->
    <g stroke="#334155" stroke-width="2" stroke-linecap="round" fill="none">
      <path d="M118 193 Q114 200 110 205"/>
      <path d="M118 193 Q118 202 116 207"/>
      <path d="M118 193 Q122 201 124 206"/>
      <path d="M138 193 Q134 200 130 205"/>
      <path d="M138 193 Q138 202 140 207"/>
      <path d="M138 193 Q142 200 146 205"/>
    </g>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
</svg>
