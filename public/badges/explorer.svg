<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#111419"/>
    <!-- Compass outer ring -->
    <circle cx="128" cy="128" r="88" fill="#1E293B" stroke="#334155" stroke-width="3"/>
    <circle cx="128" cy="128" r="80" fill="#253040" stroke="#4A5568" stroke-width="1"/>
    <!-- Compass cardinal markers -->
    <g font-family="serif" font-size="16" text-anchor="middle" fill="#6B7280" font-weight="bold">
      <text x="128" y="52">N</text>
      <text x="204" y="133">E</text>
      <text x="128" y="215">S</text>
      <text x="52" y="133">W</text>
    </g>
    <!-- Ordinal direction ticks -->
    <g stroke="#4A5568" stroke-width="1.5">
      <line x1="165" y1="67" x2="160" y2="75"/>
      <line x1="191" y1="91" x2="183" y2="96"/>
      <line x1="189" y1="165" x2="181" y2="160"/>
      <line x1="165" y1="189" x2="160" y2="181"/>
      <line x1="91" y1="189" x2="96" y2="181"/>
      <line x1="67" y1="165" x2="75" y2="160"/>
      <line x1="67" y1="91" x2="75" y2="96"/>
      <line x1="91" y1="67" x2="96" y2="75"/>
    </g>
    <!-- 5 illuminated direction markers (green) -->
    <g fill="#22C55E" filter="none">
      <!-- N marker (illuminated) -->
      <polygon points="128,72 122,90 128,86 134,90" opacity="0.95"/>
      <!-- NE marker (illuminated) -->
      <polygon points="172,84 165,98 170,96 175,100" opacity="0.85" transform="rotate(45, 128, 128)"/>
      <!-- E marker (illuminated) -->
      <polygon points="184,128 166,122 170,128 166,134" opacity="0.95"/>
      <!-- SE marker (illuminated - 2 is offset 45deg from E) -->
      <polygon points="172,172 165,158 170,160 175,156" opacity="0.75" transform="rotate(90, 128, 128)"/>
      <!-- S marker (5th) -->
      <polygon points="128,184 134,166 128,170 122,166" opacity="0.9"/>
    </g>
    <!-- Remaining markers (dark/unlit) -->
    <g fill="#334155">
      <polygon points="84,84 91,98 86,96 81,100" transform="rotate(225, 128, 128)"/>
      <polygon points="72,128 90,122 86,128 90,134"/>
      <polygon points="84,172 91,158 86,160 81,156" transform="rotate(315, 128, 128)"/>
    </g>
    <!-- Compass needle (red tip north) -->
    <g transform="translate(128, 128)">
      <polygon points="0,-55 -6,0 0,10 6,0" fill="#22C55E"/>
      <polygon points="0,55 -6,0 0,-10 6,0" fill="#4A5568"/>
    </g>
    <!-- Needle center pin -->
    <circle cx="128" cy="128" r="8" fill="#1E293B" stroke="#4A5568" stroke-width="2"/>
    <circle cx="128" cy="128" r="4" fill="#22C55E"/>
    <!-- Kanji 探 in needle direction -->
    <text x="128" y="118" font-family="serif" font-size="12" text-anchor="middle" fill="#22C55E" opacity="0.7" font-weight="bold">探</text>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#6B7280" stroke-width="1.5"/>
</svg>
