<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <filter id="kglow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="#111419"/>
    <!-- Bowl body (kintsugi ceramic) -->
    <path d="M55 118 Q55 200 128 208 Q201 200 201 118 Q185 100 128 96 Q71 100 55 118Z" fill="#C8D0D8"/>
    <!-- Bowl interior dark -->
    <path d="M65 120 Q65 192 128 200 Q191 192 191 120 Q177 108 128 105 Q79 108 65 120Z" fill="#8090A0"/>
    <!-- Kintsugi gold seam lines on bowl (GLOWING) -->
    <g filter="url(#kglow)">
      <path d="M90 118 Q100 140 95 165 Q98 185 115 198" fill="none" stroke="#FFD700" stroke-width="3">
        <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite"/>
      </path>
      <path d="M128 105 Q135 130 140 155 Q145 175 150 198" fill="none" stroke="#FFD700" stroke-width="3">
        <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite" begin="0.5s"/>
      </path>
      <path d="M165 122 Q158 145 162 168 Q160 185 148 198" fill="none" stroke="#FFD700" stroke-width="2.5">
        <animate attributeName="opacity" values="1;0.5;1" dur="3s" repeatCount="indefinite" begin="1s"/>
      </path>
      <path d="M70 138 Q88 148 100 155 Q115 162 125 165" fill="none" stroke="#FFD700" stroke-width="2.5">
        <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite" begin="0.8s"/>
      </path>
      <path d="M185 138 Q168 148 158 155 Q143 162 130 165" fill="none" stroke="#FFD700" stroke-width="2.5">
        <animate attributeName="opacity" values="1;0.6;1" dur="3s" repeatCount="indefinite" begin="1.3s"/>
      </path>
    </g>
    <!-- Bowl rim -->
    <ellipse cx="128" cy="118" rx="73" ry="22" fill="#D0D8E0" stroke="#B0B8C0" stroke-width="2"/>
    <!-- Kanji 不死身 on rim -->
    <text x="128" y="124" font-family="serif" font-size="14" text-anchor="middle" fill="#FFD700" opacity="0.8" font-weight="bold">不死身</text>
    <!-- Flame inside bowl -->
    <path d="M118 145 Q128 128 138 145 Q134 132 128 124 Q122 132 118 145Z" fill="#E8751A" opacity="0.9">
      <animate attributeName="d" values="M118 145 Q128 128 138 145 Q134 132 128 124 Q122 132 118 145Z;M120 145 Q128 126 136 145 Q132 130 128 122 Q124 130 120 145Z;M118 145 Q128 128 138 145 Q134 132 128 124 Q122 132 118 145Z" dur="2s" repeatCount="indefinite"/>
    </path>
    <path d="M122 145 Q128 134 134 145 Q131 136 128 130 Q125 136 122 145Z" fill="#FFD700" opacity="0.7">
      <animate attributeName="d" values="M122 145 Q128 134 134 145 Q131 136 128 130 Q125 136 122 145Z;M123 145 Q128 132 133 145 Q130 134 128 128 Q126 134 123 145Z;M122 145 Q128 134 134 145 Q131 136 128 130 Q125 136 122 145Z" dur="1.6s" repeatCount="indefinite" begin="0.3s"/>
    </path>
  </g>
  <circle cx="128" cy="128" r="122" fill="none" stroke="#22C55E" stroke-width="1.5" opacity="0.7"/>
</svg>
