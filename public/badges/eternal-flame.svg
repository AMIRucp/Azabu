<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="c"><circle cx="128" cy="128" r="120"/></clipPath>
    <radialGradient id="phoenix-bg" cx="50%" cy="55%" r="55%">
      <stop offset="0%" stop-color="#1A0530"/>
      <stop offset="100%" stop-color="#050108"/>
    </radialGradient>
    <linearGradient id="phoenix-body" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="35%" stop-color="#E8751A"/>
      <stop offset="70%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#FFD700"/>
    </linearGradient>
    <filter id="pfglow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#050108"/>
  <g clip-path="url(#c)">
    <circle cx="128" cy="128" r="128" fill="url(#phoenix-bg)"/>
    <!-- Ash bed -->
    <ellipse cx="128" cy="220" rx="60" ry="12" fill="#4A5568" opacity="0.5"/>
    <!-- Cherry blossom ashes -->
    <g fill="#FFB7C5" opacity="0.4">
      <ellipse cx="88" cy="215" rx="5" ry="3" transform="rotate(20, 88, 215)"/>
      <ellipse cx="108" cy="222" rx="4" ry="2.5" transform="rotate(-15, 108, 222)"/>
      <ellipse cx="148" cy="218" rx="5" ry="3" transform="rotate(30, 148, 218)"/>
      <ellipse cx="168" cy="220" rx="4" ry="2.5" transform="rotate(-10, 168, 220)"/>
    </g>
    <!-- Particle flame base -->
    <g filter="url(#pfglow)">
      <!-- Phoenix wing left -->
      <path d="M128 168 Q88 148 55 118 Q45 105 52 92 Q68 78 88 88 Q105 95 115 112 Q120 120 128 128Z" fill="url(#phoenix-body)" opacity="0.85">
        <animate attributeName="d" values="M128 168 Q88 148 55 118 Q45 105 52 92 Q68 78 88 88 Q105 95 115 112 Q120 120 128 128Z;M128 165 Q86 145 53 115 Q43 102 50 89 Q66 75 86 85 Q103 92 113 109 Q118 117 128 125Z;M128 168 Q88 148 55 118 Q45 105 52 92 Q68 78 88 88 Q105 95 115 112 Q120 120 128 128Z" dur="3s" repeatCount="indefinite"/>
      </path>
      <!-- Wing left feather tips -->
      <path d="M55 118 Q42 105 38 85 Q52 98 55 118Z" fill="#FFD700" opacity="0.7"/>
      <path d="M68 100 Q58 85 56 65 Q68 80 68 100Z" fill="#E8751A" opacity="0.7"/>
      <path d="M86 88 Q80 72 82 52 Q90 68 86 88Z" fill="#FFD700" opacity="0.6"/>
      <!-- Phoenix wing right (mirror) -->
      <path d="M128 168 Q168 148 201 118 Q211 105 204 92 Q188 78 168 88 Q151 95 141 112 Q136 120 128 128Z" fill="url(#phoenix-body)" opacity="0.85">
        <animate attributeName="d" values="M128 168 Q168 148 201 118 Q211 105 204 92 Q188 78 168 88 Q151 95 141 112 Q136 120 128 128Z;M128 165 Q170 145 203 115 Q213 102 206 89 Q190 75 170 85 Q153 92 143 109 Q138 117 128 125Z;M128 168 Q168 148 201 118 Q211 105 204 92 Q188 78 168 88 Q151 95 141 112 Q136 120 128 128Z" dur="3s" repeatCount="indefinite" begin="0.3s"/>
      </path>
      <path d="M201 118 Q214 105 218 85 Q204 98 201 118Z" fill="#FFD700" opacity="0.7"/>
      <path d="M188 100 Q198 85 200 65 Q188 80 188 100Z" fill="#E8751A" opacity="0.7"/>
      <path d="M170 88 Q176 72 174 52 Q166 68 170 88Z" fill="#FFD700" opacity="0.6"/>
      <!-- Phoenix body/torso -->
      <path d="M115 195 Q108 168 112 145 Q118 128 128 118 Q138 128 142 145 Q146 168 141 195 Q135 210 128 215 Q121 210 115 195Z" fill="url(#phoenix-body)">
        <animate attributeName="d" values="M115 195 Q108 168 112 145 Q118 128 128 118 Q138 128 142 145 Q146 168 141 195 Q135 210 128 215 Q121 210 115 195Z;M116 195 Q109 168 113 143 Q119 126 128 116 Q137 126 139 143 Q143 166 140 193 Q134 210 128 215 Q122 210 116 195Z;M115 195 Q108 168 112 145 Q118 128 128 118 Q138 128 142 145 Q146 168 141 195 Q135 210 128 215 Q121 210 115 195Z" dur="2.5s" repeatCount="indefinite"/>
      </path>
      <!-- Phoenix neck/head -->
      <path d="M120 118 Q124 98 128 88 Q132 98 136 118" fill="url(#phoenix-body)" stroke="none"/>
      <!-- Phoenix head -->
      <ellipse cx="128" cy="82" rx="12" ry="10" fill="#FFD700"/>
      <!-- Crest feathers -->
      <path d="M128 72 Q122 58 120 45 Q128 62 128 72Z" fill="#E8751A"/>
      <path d="M128 72 Q128 55 132 42 Q132 58 128 72Z" fill="#FFD700"/>
      <path d="M128 72 Q135 60 140 48 Q134 62 128 72Z" fill="#E8751A"/>
      <!-- Eyes (glowing white) -->
      <circle cx="124" cy="82" r="4" fill="#FFFFFF">
        <animate attributeName="r" values="4;5;4" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="132" cy="82" r="4" fill="#FFFFFF">
        <animate attributeName="r" values="4;5;4" dur="4s" repeatCount="indefinite" begin="0.5s"/>
      </circle>
      <!-- Tail feathers -->
      <path d="M120 198 Q108 210 98 228" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
      <path d="M128 210 Q125 222 124 240" fill="none" stroke="#E8751A" stroke-width="3" stroke-linecap="round"/>
      <path d="M136 198 Q148 210 158 228" fill="none" stroke="#FFD700" stroke-width="3" stroke-linecap="round"/>
    </g>
    <!-- Floating fire particles -->
    <g fill="#FFD700" filter="url(#pfglow)">
      <circle cx="72" cy="95" r="2" opacity="0.8">
        <animate attributeName="cy" values="95;50;95" dur="4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0;0.8" dur="4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="185" cy="88" r="2" opacity="0.7">
        <animate attributeName="cy" values="88;44;88" dur="4.5s" repeatCount="indefinite" begin="1s"/>
        <animate attributeName="opacity" values="0.7;0;0.7" dur="4.5s" repeatCount="indefinite" begin="1s"/>
      </circle>
      <circle cx="95" cy="75" r="1.5" opacity="0.9">
        <animate attributeName="cy" values="75;32;75" dur="3.5s" repeatCount="indefinite" begin="2s"/>
        <animate attributeName="opacity" values="0.9;0;0.9" dur="3.5s" repeatCount="indefinite" begin="2s"/>
      </circle>
    </g>
    <!-- Kanji 永 floating in chest -->
    <text x="128" y="164" font-family="serif" font-size="22" text-anchor="middle" fill="#FFFFFF" opacity="0.7" font-weight="bold">永</text>
  </g>
  <!-- Animated gradient border - cycling gold/orange/red -->
  <circle cx="128" cy="128" r="122" fill="none" stroke="#FFD700" stroke-width="3">
    <animate attributeName="stroke" values="#FFD700;#E8751A;#EF4444;#FFD700" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="stroke-dasharray" values="0,800;300,500;600,200;800,0;600,200;300,500;0,800" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
