<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="128" cy="128" r="120"/>
    </clipPath>
  </defs>
  <circle cx="128" cy="128" r="128" fill="#0E1117"/>
  <g clip-path="url(#circle-clip)">
    <circle cx="128" cy="128" r="128" fill="#1A1E28"/>
    <!-- Kanji 初 watermark -->
    <text x="128" y="155" font-family="serif" font-size="140" text-anchor="middle" fill="#3A3F4E" opacity="0.35" font-weight="900">初</text>
    <!-- Shield (round, behind swords) -->
    <circle cx="128" cy="128" r="52" fill="#252C3A" stroke="#6B7280" stroke-width="4"/>
    <circle cx="128" cy="128" r="44" fill="none" stroke="#5A6278" stroke-width="1.5" opacity="0.5"/>
    <!-- Shield boss center -->
    <circle cx="128" cy="128" r="10" fill="#3A4050" stroke="#6B7280" stroke-width="2"/>
    <!-- Bokken (left, diagonal top-left to bottom-right) -->
    <g transform="rotate(-40, 128, 128)">
      <rect x="120" y="42" width="16" height="110" rx="3" fill="#7B6449"/>
      <rect x="122" y="42" width="4" height="110" rx="2" fill="#9B8060" opacity="0.6"/>
      <!-- Handle wrap -->
      <rect x="120" y="140" width="16" height="14" rx="2" fill="#5A4832"/>
      <rect x="118" y="136" width="20" height="6" rx="2" fill="#4A3D28"/>
      <!-- Tsuba (guard) -->
      <ellipse cx="128" cy="152" rx="14" ry="5" fill="#5A5A5A"/>
    </g>
    <!-- Bokken (right, diagonal) -->
    <g transform="rotate(40, 128, 128)">
      <rect x="120" y="42" width="16" height="110" rx="3" fill="#7B6449"/>
      <rect x="122" y="42" width="4" height="110" rx="2" fill="#9B8060" opacity="0.6"/>
      <rect x="120" y="140" width="16" height="14" rx="2" fill="#5A4832"/>
      <rect x="118" y="136" width="20" height="6" rx="2" fill="#4A3D28"/>
      <ellipse cx="128" cy="152" rx="14" ry="5" fill="#5A5A5A"/>
    </g>
  </g>
  <!-- Rarity border -->
  <circle cx="128" cy="128" r="122" fill="none" stroke="#6B7280" stroke-width="2"/>
</svg>
