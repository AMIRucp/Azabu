<svg viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <line x1="30" y1="90" x2="170" y2="90" stroke="#2A2A2A" stroke-width="1" />
  <polyline points="30,72 55,72 70,72 82,30 94,85 106,58 118,72 170,72"
    stroke="#6B6A67" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"
    class="pulse" stroke-dasharray="250" stroke-dashoffset="250" />
  <style>
    .pulse { animation: drawPulse 1.2s ease-out forwards; }
    @keyframes drawPulse { 100%{stroke-dashoffset:0} }
  </style>
</svg>
