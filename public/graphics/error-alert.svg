<svg viewBox="0 0 200 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <circle cx="100" cy="60" r="28" stroke="#3D3D3A" stroke-width="1" fill="none" class="ring"
    stroke-dasharray="176" stroke-dashoffset="176" />
  <line x1="90" y1="50" x2="110" y2="70" stroke="#6B6A67" stroke-width="1.5" stroke-linecap="round" class="x1" />
  <line x1="110" y1="50" x2="90" y2="70" stroke="#6B6A67" stroke-width="1.5" stroke-linecap="round" class="x2" />
  <style>
    .ring { animation: drawRing 0.5s ease-out forwards; }
    @keyframes drawRing { 100%{stroke-dashoffset:0} }
    .x1, .x2 { opacity:0; animation: xIn 0.2s 0.35s ease-out forwards; }
    @keyframes xIn { 0%{opacity:0} 100%{opacity:1} }
  </style>
</svg>
