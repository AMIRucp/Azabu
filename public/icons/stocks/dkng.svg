<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#0D9E3A"/>
      <stop offset="100%" stop-color="#065E22"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>
  <circle cx="100" cy="100" r="100" fill="url(#bg)"/>
  <circle cx="100" cy="100" r="100" fill="none" stroke="#0BBB44" stroke-width="3" opacity="0.4"/>

  <!-- Crown shape -->
  <g transform="translate(100, 72)" filter="url(#shadow)">
    <polygon points="-36,-20 -36,12 36,12 36,-20 20,-4 0,-20 -20,-4" fill="white" opacity="0.95"/>
    <!-- Crown points -->
    <circle cx="-36" cy="-20" r="5.5" fill="white" opacity="0.95"/>
    <circle cx="0" cy="-20" r="5.5" fill="white" opacity="0.95"/>
    <circle cx="36" cy="-20" r="5.5" fill="white" opacity="0.95"/>
    <!-- Base band -->
    <rect x="-36" y="10" width="72" height="8" rx="1" fill="#0BBB44"/>
  </g>

  <!-- DK text -->
  <text
    x="100" y="152"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-size="36"
    font-weight="900"
    letter-spacing="3"
    fill="white"
    opacity="0.95"
  >DK</text>
</svg>
